apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ${NAMESPACE}-keyvault-tls
  namespace: ${NAMESPACE}
spec:
  provider: azure
  parameters:
    # usePodIdentity: "false"
    useVMManagedIdentity: "true" # Set to "true" for managed identity.
    userAssignedIdentityID: ${WORKLOAD_CLIENT_ID}
    keyvaultName: ${AKS_KV_NAME}
    tenantId: ${TENANT_ID}
    objects: |
      array:
        - |
          objectName: ${TLS_OBJ_NAME}
          objectType: "certificate"
          objectVersion: ""
  secretObjects:
  - secretName: ${APP_NAME}-tls-secret
    type: kubernetes.io/tls
    data:
    - objectName: ${TLS_OBJ_NAME}
      key: tls.key
    - objectName: ${TLS_OBJ_NAME}
      key: tls.crt