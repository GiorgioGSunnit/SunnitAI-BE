apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ${NAMESPACE}-keyvault-app
  namespace: ${NAMESPACE}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    # Hardcoded: GitLab Settings WORKLOAD_CLIENT_ID has typo "I" prefix
    clientID: "966176be-711b-4f2f-8b80-dce08b14a8e2"
    # Hardcoded: kv-dev-cdp-01 doesn't have AIAC secrets
    keyvaultName: "kv-aiac-cdp-dev"
    tenantId: ${TENANT_ID}
    objects: |
      array:
        - |
          objectName: azure-openai--api-key
          objectType: secret
        - |
          objectName: azure-storage--connection-string
          objectType: secret
        - |
          objectName: azure-ai-search--api-key
          objectType: secret
        - |
          objectName: translator-key
          objectType: secret
  secretObjects:
  - secretName: ${APP_NAME}-kv-secrets
    type: Opaque
    data:
    - objectName: azure-openai--api-key
      key: AZURE_OPENAI_API_KEY
    - objectName: azure-storage--connection-string
      key: CONNECTION_STRING
    - objectName: azure-ai-search--api-key
      key: SEARCH_KEY
    - objectName: translator-key
      key: TRANSLATOR_KEY
