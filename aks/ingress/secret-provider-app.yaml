# NOTE: This file is NOT used by the current server deployment (SSH + systemd via
# release.sh / deploy.sh). All credentials are loaded from the .env file on the
# server. This manifest is kept only as a reference if the project is ever
# migrated back to Kubernetes.
#
# Sensitive credentials for the app — injected as a K8s Secret.
# Azure Key Vault CSI driver has been removed.
#
# How to create this secret before deploying:
#
#   kubectl create secret generic ${APP_NAME}-secrets \
#     --namespace=${NAMESPACE} \
#     --from-literal=LLM_API_KEY=<your-api-key> \
#     --from-literal=LLM_EMBEDDING_API_KEY=<your-embedding-api-key>
#
# Or apply this manifest after filling in the values (base64-encoded):
#
#   echo -n "your-api-key" | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: ${APP_NAME}-secrets
  namespace: ${NAMESPACE}
type: Opaque
data:
  # base64-encoded values — fill in before applying
  LLM_API_KEY: ""
  LLM_EMBEDDING_API_KEY: ""
