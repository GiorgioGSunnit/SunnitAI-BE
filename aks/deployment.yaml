apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_NAME}-service
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "${APP_NAME}-service"
      app.kubernetes.io/part-of: "${NAMESPACE}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "${APP_NAME}-service"
        app.kubernetes.io/part-of: "${NAMESPACE}"
    spec:
      containers:
      - name: ${APP_NAME}-container
        image: ${IMAGE_NAME}
        envFrom:
        - configMapRef:
            name: ${APP_NAME}-configmap
        - secretRef:
            name: ${APP_NAME}-secrets
        ports:
          - containerPort: 2025
            name: fastapi
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
          - name: local-storage
            mountPath: /opt/sunnitai-be/storage
      volumes:
        - name: local-storage
          persistentVolumeClaim:
            claimName: ${APP_NAME}-storage-pvc

---

apiVersion: v1
kind: Service
metadata:
  name: ${APP_NAME}-service
  namespace: ${NAMESPACE}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: "${APP_NAME}-service"
    app.kubernetes.io/part-of: "${NAMESPACE}"
  ports:
  - port: 2025
    targetPort: 2025
    name: fastapi
